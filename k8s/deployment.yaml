apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluxgate-deployment
  labels:
    app: fluxgate
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fluxgate
  template:
    metadata:
      labels:
        app: fluxgate
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: fluxgate
        image: fluxgate:latest
        ports:
        - containerPort: 8080
        - containerPort: 8081
        - containerPort: 8082
        - containerPort: 9090
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fluxgate-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: fluxgate-secrets
              key: REDIS_URL
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fluxgate-service
spec:
  selector:
    app: fluxgate
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
