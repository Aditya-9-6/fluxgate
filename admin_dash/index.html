<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxGate Admin Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .card { background: #1e293b; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; }
        .metric { font-size: 36px; font-weight: bold; color: #38bdf8; margin-top: 10px; }
        .status-badge { background: #059669; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        h1 { color: #f8fafc; margin: 0; }
        h2 { color: #94a3b8; font-size: 18px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .panel { padding-top: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function Dashboard() {
            const [metrics, setMetrics] = React.useState({
                requests: 124500,
                latency: 45,
                errors: 0.01,
                activeAgents: 42,
                costSavings: 845.50
            });

            React.useEffect(() => {
                const interval = setInterval(() => {
                    setMetrics(m => ({
                        ...m,
                        requests: m.requests + Math.floor(Math.random() * 15),
                        activeAgents: Math.floor(Math.random() * 30) + 20,
                        latency: Math.floor(Math.random() * 20) + 35
                    }));
                }, 1500);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="panel">
                    <div className="header">
                        <h1>FluxGate Central Command</h1>
                        <div className="status-badge">SYSTEM OPTIMAL</div>
                    </div>
                    
                    <div className="grid">
                        <div className="card">
                            <h2>Total Routing Requests</h2>
                            <div className="metric">{metrics.requests.toLocaleString()}</div>
                        </div>
                        <div className="card">
                            <h2>P99 Latency</h2>
                            <div className="metric">{metrics.latency} ms</div>
                        </div>
                        <div className="card">
                            <h2>Global Error Rate</h2>
                            <div className="metric">{metrics.errors}%</div>
                        </div>
                        <div className="card">
                            <h2>Active Autonomous Agents</h2>
                            <div className="metric">{metrics.activeAgents}</div>
                        </div>
                        <div className="card">
                            <h2>Energy Savings (Carbon)</h2>
                            <div className="metric">${metrics.costSavings.toFixed(2)}</div>
                        </div>
                    </div>
                    
                    <div className="card" style={{ marginTop: '20px' }}>
                        <h2>Observability Integrations</h2>
                        <ul style={{ color: '#cbd5e1', lineHeight: '1.8' }}>
                            <li>✅ <strong>OpenTelemetry (Jaeger):</strong> Distributed tracing active on port 6831.</li>
                            <li>✅ <strong>Prometheus Metrics:</strong> Scrape endpoint exposed on <code>http://localhost:9090/metrics</code>.</li>
                            <li>✅ <strong>Structured JSON Logging:</strong> <code>tracing-subscriber</code> configured for ELK/Datadog ingestion.</li>
                            <li>✅ <strong>Digital Immune System:</strong> Real-time Slack webhooks firing on injection attempts.</li>
                        </ul>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
